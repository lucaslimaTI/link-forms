Eleição do CMPC – Biênio 2026–2028

Bem-vindo ao sistema de participação na eleição do Conselho Municipal de Política Cultural de Araxá (CMPC), desenvolvido conforme o Edital de Convocação nº 01/2026.

Por meio deste sistema, agentes culturais do município poderão realizar sua inscrição para participar do processo eleitoral, seja como votantes ou candidatos, conforme os requisitos estabelecidos no edital.

O processo é totalmente on-line e foi desenvolvido para ser simples e acessível. Basta preencher o formulário, informar sua atuação cultural e anexar a documentação exigida. Após a análise e aprovação da inscrição, o participante será habilitado para exercer a modalidade de participação correspondente.

Quem pode participar

Podem participar do processo eleitoral agentes culturais que:

Possuam cadastro no Sistema de Agentes Culturais do Município;
Tenham vínculo com um segmento cultural;
Comprovem atuação cultural, conforme previsto no edital.
Documentação necessária

No ato da inscrição, deverão ser apresentados:

Documento oficial de identificação com foto;
CPF;
Comprovante de residência em Araxá ou declaração de atuação no município;
Comprovação de atuação cultural;
Indicação do segmento cultural;
Comprovante de cadastro no Sistema de Agentes Culturais;
Declaração de veracidade das informações.
Informações importantes
A Comissão Eleitoral poderá solicitar documentos complementares durante a análise das inscrições.
Cada participante poderá realizar apenas uma inscrição no processo eleitoral, observando as regras estabelecidas no edital.
As inscrições serão analisadas pela Comissão Eleitoral, que verificará o atendimento aos requisitos para habilitação como votante ou candidato.
As informações dos candidatos habilitados poderão ser disponibilizadas em ambiente digital, garantindo transparência ao processo eleitoral e possibilitando aos eleitores conhecer o perfil e a trajetória dos concorrentes.

Em caso de dúvidas, entre em contato com a Fundação Cultural Calmon Barreto de Araxá. 📍 Endereço: Praça Artur Bernardes, 10 - Centro, Araxá - MG, 38183-218 

E-mail: secretaria.presidencia@fundacaocalmonbarreto.mg.gov.br">

                <i class="fa-solid fa-circle-info"></i>
