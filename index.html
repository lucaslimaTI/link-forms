Cadastro de Votantes – Eleição do CMPC (Biênio 2026–2028)
Apresentamos o serviço de Cadastro de Votantes para a eleição do Conselho Municipal de Política Cultural de Araxá (CMPC), desenvolvido com base no Edital de Convocação nº 01/2026.
Este serviço permite que agentes culturais do município se inscrevam para participar da eleição como eleitores, garantindo sua habilitação para a etapa de votação.
O processo é totalmente online e foi pensado para ser simples e acessível. Basta preencher seus dados, informar sua atuação cultural e enviar os documentos necessários. Após a inscrição, as informações passam por análise e, se estiverem corretas, o cadastro será habilitado.
Essa é uma oportunidade importante de contribuir com as decisões sobre a cultura no município e fortalecer a participação da sociedade civil.
Etapas do processo
Este serviço faz parte de uma jornada maior, composta por duas etapas:
Cadastro de votantes (etapa atual)
Votação (realizada posteriormente, apenas para habilitados)
Quem pode se cadastrar
Podem se inscrever como votantes:
Agentes culturais do município;
Pessoas vinculadas a um segmento cultural;
Pessoas com cadastro no sistema cultural do município;
Pessoas com atuação cultural comprovada.
Requisitos para participação
Para se cadastrar, é necessário:
Estar cadastrado no sistema de agentes culturais do município;
Possuir vínculo com um segmento cultural;
Comprovar atuação cultural (de forma simplificada).
Documentação necessária
No momento da inscrição, será solicitado o envio dos seguintes documentos:
Documentos obrigatórios:
Documento de identificação oficial com foto (RG ou equivalente);
CPF;
Comprovante de residência em Araxá ou declaração de atuação no município;
Comprovação de atuação cultural (portfólio, registros, certificados, links, entre outros);
Indicação do segmento cultural ao qual está vinculado;
Comprovante de cadastro no sistema cultural do município;
Declaração de veracidade das informações.
Observações importantes:
A Comissão Eleitoral poderá solicitar documentos complementares, se necessário;
As informações fornecidas pelos candidatos serão disponibilizadas em ambiente digital, garantindo transparência ao processo eleitoral. Dessa forma, os eleitores poderão acessar e conhecer melhor o perfil, a trajetória e as propostas de cada candidato, contribuindo para uma escolha mais informada e consciente; 
Cada pessoa pode se inscrever apenas uma vez no processo eleitoral, seja como votante ou como representante.
Em caso de dúvidas, entre em contato com a Fundação Cultural Calmon Barreto de Araxá:

📍 Endereço: Praça Artur Bernardes, 10 - Centro, Araxá - MG, 38183-218

✉️ E-mail: secretaria.presidencia@fundacaocalmonbarreto.mg.gov.br">

                <i class="fa-solid fa-circle-info"></i>

            </button>

        </div>
